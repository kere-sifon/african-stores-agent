# Open security update PRs against develop

version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: develop
    labels:
      - dependencies
      - security
    cooldown:
      default-days: 7
