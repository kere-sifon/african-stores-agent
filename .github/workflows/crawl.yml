# Crawl African Stores Canada directory (Bedrock + pipeline)
#
# Auth: GitHub OIDC → AWS IAM role (no long-lived access keys in secrets)
#
# One-time AWS setup:
#   1. IAM → Identity providers → Add provider (GitHub Actions OIDC)
#      URL: https://token.actions.githubusercontent.com
#      Audience: sts.amazonaws.com
#   2. IAM → Roles → Create role → Web identity → that provider
#      Trust: repo + branch in token.actions.githubusercontent.com:sub
#      Permissions: bedrock:InvokeModel on foundation-model/* and inference-profile/*
#      (cross-region profile us.anthropic... routes to us-east-2 etc. — use * region in IAM)
#   3. Copy role ARN
#
# GitHub — Settings → Secrets and variables → Actions → Variables (required):
#   AWS_ROLE_ARN = arn:aws:iam::ACCOUNT_ID:role/github-actions-african-stores
# (Secret also works if you named it AWS_ROLE_ARN there instead.)
#
# Trust policy sub must match the branch you run from (e.g. repo:ORG/REPO:*).
#
# Required secret: MONGODB_URI (Atlas connection string)
# Optional variables: AWS_REGION, BEDROCK_MODEL_ID, MONGODB_DB_NAME, MONGODB_COLLECTION

name: Crawl directory

on:
  workflow_dispatch:
    inputs:
      mode:
        description: What to run
        required: true
        default: test
        type: choice
        options:
          - test
          - full
          - generate
          - smoke
      restore_db:
        description: Restore african_stores.db from the last successful run
        required: false
        default: true
        type: boolean

  schedule:
    - cron: "0 12 * * 0"

concurrency:
  group: directory-crawl-${{ github.ref }}
  cancel-in-progress: false

env:
  LLM_PROVIDER: bedrock
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID || 'us.anthropic.claude-haiku-4-5-20251001-v1:0' }}
  STORAGE_BACKEND: mongodb
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGODB_DB_NAME: ${{ vars.MONGODB_DB_NAME || 'african_stores' }}
  MONGODB_COLLECTION: ${{ vars.MONGODB_COLLECTION || 'stores' }}
  PYTHONUNBUFFERED: "1"

jobs:
  crawl:
    name: ${{ github.event_name == 'schedule' && 'Scheduled test crawl' || format('Crawl ({0})', inputs.mode) }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event_name == 'schedule' && 45 || (inputs.mode == 'full' && 180 || 45) }}

    permissions:
      id-token: write # required for OIDC — must be on the job, not only workflow root
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate AWS OIDC configuration
        run: |
          ROLE_ARN="${{ vars.AWS_ROLE_ARN }}"
          if [ -z "$ROLE_ARN" ]; then
            ROLE_ARN="${{ secrets.AWS_ROLE_ARN }}"
          fi
          if [ -z "$ROLE_ARN" ]; then
            echo "::error::AWS_ROLE_ARN is not set."
            echo "Add repository Variable: Settings → Secrets and variables → Actions → Variables"
            echo "  Name: AWS_ROLE_ARN"
            echo "  Value: arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"
            exit 1
          fi
          echo "AWS_ROLE_ARN is set (${#ROLE_ARN} characters)"
          echo "Workflow ref: ${{ github.ref }} (must match IAM trust policy sub condition)"
          echo "Repository: ${{ github.repository }}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve crawl mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=test" >> "$GITHUB_OUTPUT"
            echo "restore_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "restore_db=${{ inputs.restore_db }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore database from previous run
        if: steps.mode.outputs.restore_db == 'true'
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: crawl.yml
          name: directory-data
          path: .
          if_no_artifact_found: ignore
          workflow_conclusion: success

      - name: Bedrock smoke test
        if: steps.mode.outputs.mode == 'smoke'
        run: |
          python -c "from config import llm_config_summary; print(llm_config_summary())"
          python -c "
          from config import get_llm
          print(get_llm().invoke('Reply in one sentence that Bedrock is working.').content)
          print('✅ Bedrock chat OK')
          "
          python <<'PY'
          import sys
          from extractor import extract_store_info

          r = extract_store_info(
              'Mama Africa Grocery, 45 Eglinton Ave, Toronto ON. West African foods.',
              'Toronto, Ontario',
          )
          if r and r.name:
              print('✅ Extractor OK:', r.name)
              sys.exit(0)

          print('::error::Extractor failed.')
          print('If the log mentions \"use case details\", complete the Anthropic form in')
          print('Bedrock console (us-east-1) → Model catalog → Claude Haiku 4.5 →')
          print('Submit use case details. Wait ~15 minutes, then re-run smoke.')
          sys.exit(1)
          PY

      - name: Run pipeline (test)
        if: steps.mode.outputs.mode == 'test'
        run: |
          python run.py
          python run.py --generate
          python run.py --stats

      - name: Run pipeline (full)
        if: steps.mode.outputs.mode == 'full'
        run: |
          python run.py --full
          python run.py --stats

      - name: Generate site only
        if: steps.mode.outputs.mode == 'generate'
        run: |
          test -f african_stores.db || (echo "No african_stores.db — enable restore_db or run test/full first" && exit 1)
          python run.py --generate
          python run.py --stats

      - name: Upload database and site
        if: always() && steps.mode.outputs.mode != 'smoke'
        uses: actions/upload-artifact@v4
        with:
          name: directory-data
          path: |
            african_stores.db
            output/
          retention-days: 30
          if-no-files-found: warn
