# Crawl African Stores Canada directory
#
# Auth: GitHub OIDC → AWS IAM role (no long-lived access keys in secrets)
#
# One-time AWS setup:
#   1. IAM → Identity providers → Add provider (GitHub Actions OIDC)
#      URL: https://token.actions.githubusercontent.com
#      Audience: sts.amazonaws.com
#   2. IAM → Roles → Create role → Web identity → that provider
#      Trust: repo + branch in token.actions.githubusercontent.com:sub
#      Permissions: bedrock:InvokeModel on foundation-model/* and inference-profile/*
#      (cross-region profile us.anthropic... routes to us-east-2 etc. — use * region in IAM)
#   3. Copy role ARN
#
# GitHub — Settings → Secrets and variables → Actions → Variables (required):
#   AWS_ROLE_ARN = arn:aws:iam::ACCOUNT_ID:role/github-actions-african-stores
#
# Required secrets:
#   MONGODB_URI           — Atlas connection string
#   NOTIFY_EMAIL_FROM     — Gmail address sending the report
#   NOTIFY_EMAIL_PASSWORD — Gmail app password (16 chars, not your login password)
#   NOTIFY_EMAIL_TO       — Destination email address
#
# Optional variables: AWS_REGION, BEDROCK_MODEL_ID, MONGODB_DB_NAME, MONGODB_COLLECTION
#
# Schedule:
#   Weekly Sunday 6am ET — province rotation (one province per week)
#   Full cycle: 10 provinces × 10 weeks = national coverage every 2.5 months
#   34 cities covered across all provinces
#   Monthly full crawl removed — province rotation is more thorough
#
#   agent-full kept as manual dispatch option for one-off full resets only

name: Crawl directory

on:
  workflow_dispatch:
    inputs:
      mode:
        description: What to run
        required: true
        default: agent
        type: choice
        options:
          - agent
          - agent-full
          - province-weekly
          - province
          - city
          - names
          - generate
          - smoke
      province:
        description: 'Province name — e.g. "Alberta" (required for mode=province)'
        required: false
        default: ""
        type: string
      store_names:
        description: Store names (comma or newline separated). Required when mode=names.
        required: false
        type: string
      city:
        description: 'City to crawl — e.g. "Toronto, Ontario" (required for mode=city or names)'
        required: false
        default: "Toronto, Ontario"
        type: string
      use_agent:
        description: Use LangGraph agent instead of pipeline (city / names modes)
        required: false
        default: false
        type: boolean

  schedule:
    # Weekly Sunday 6am ET (11:00 UTC) — province rotation
    # Full cycle: 10 provinces × 1 week = national coverage every 10 weeks
    # Covers 34 cities (vs 5 in the old monthly full crawl — removed)
    - cron: "0 11 * * 0"

concurrency:
  group: directory-crawl-${{ github.ref }}
  cancel-in-progress: false

env:
  LLM_PROVIDER: bedrock
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID || 'us.anthropic.claude-haiku-4-5-20251001-v1:0' }}
  STORAGE_BACKEND: mongodb
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGODB_DB_NAME: ${{ vars.MONGODB_DB_NAME || 'african_stores' }}
  MONGODB_COLLECTION: ${{ vars.MONGODB_COLLECTION || 'stores' }}
  PYTHONUNBUFFERED: "1"

jobs:
  crawl:
    name: >-
      ${{ github.event_name == 'schedule' && 'Scheduled province rotation (weekly)' ||
          format('Manual crawl ({0})', inputs.mode) }}
    runs-on: ubuntu-latest
    timeout-minutes: >-
      ${{ inputs.mode == 'agent-full' && 180 ||
          inputs.mode == 'province-weekly' && 120 ||
          inputs.mode == 'province' && 120 ||
          inputs.mode == 'city' && 120 ||
          github.event_name == 'schedule' && 120 || 60 }}

    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate AWS OIDC configuration
        env:
          ROLE_ARN_VAR: ${{ vars.AWS_ROLE_ARN }}
          ROLE_ARN_SECRET: ${{ secrets.AWS_ROLE_ARN }}
          WORKFLOW_REF: ${{ github.ref }}
          REPO_NAME: ${{ github.repository }}
        run: |
          ROLE_ARN="$ROLE_ARN_VAR"
          if [ -z "$ROLE_ARN" ]; then
            ROLE_ARN="$ROLE_ARN_SECRET"
          fi
          if [ -z "$ROLE_ARN" ]; then
            echo "::error::AWS_ROLE_ARN is not set."
            echo "Add it under: Settings → Secrets and variables → Actions → Variables"
            echo "  Name: AWS_ROLE_ARN"
            echo "  Value: arn:aws:iam::ACCOUNT_ID:role/YOUR_ROLE_NAME"
            exit 1
          fi
          echo "AWS_ROLE_ARN is set (${#ROLE_ARN} characters)"
          echo "Workflow ref: $WORKFLOW_REF"
          echo "Repository:   $REPO_NAME"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b  # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve crawl mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          MODE_INPUT: ${{ inputs.mode }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            # Weekly cron → province rotation (monthly cron removed)
            echo "mode=province-weekly" >> "$GITHUB_OUTPUT"
          else
            echo "mode=$MODE_INPUT" >> "$GITHUB_OUTPUT"
          fi

      # ── Smoke test ────────────────────────────────────────────────────────────
      - name: Bedrock + MongoDB smoke test
        if: steps.mode.outputs.mode == 'smoke'
        run: |
          echo "--- LLM config ---"
          python -c "from config import llm_config_summary; print(llm_config_summary())"

          echo "--- Bedrock connection ---"
          python -c "
          from config import get_llm
          print(get_llm().invoke('Reply in one sentence that Bedrock is working.').content)
          print('✅ Bedrock OK')
          "

          echo "--- Extractor chain ---"
          python <<'PY'
          import sys
          from extractor import extract_store_info
          r = extract_store_info(
              'Mama Africa Grocery, 45 Eglinton Ave, Toronto ON. West African foods.',
              'Toronto, Ontario',
          )
          if r and r.name:
              print('✅ Extractor OK:', r.name)
              sys.exit(0)
          print('::error::Extractor returned no result.')
          sys.exit(1)
          PY

          echo "--- MongoDB connection ---"
          python -c "
          from storage import init_db, get_stats
          init_db()
          s = get_stats()
          print(f'✅ MongoDB OK — {s[\"total\"]} stores in database')
          "

      # ── Named stores (manual seed list) ───────────────────────────────────────
      - name: Run named store crawl
        if: steps.mode.outputs.mode == 'names'
        id: names_crawl
        env:
          STORE_NAMES: ${{ inputs.store_names }}
          CITY_IN: ${{ inputs.city }}
          USE_AGENT: ${{ inputs.use_agent }}
        run: |
          if [ -z "$STORE_NAMES" ]; then
            echo "::error::store_names input is required when mode=names"
            exit 1
          fi
          printf '%s' "$STORE_NAMES" > /tmp/store_names.txt
          if [ "$USE_AGENT" = "true" ]; then
            python run.py --agent --names-file /tmp/store_names.txt --city "$CITY_IN" 2>&1 | tee /tmp/crawl_output.txt
          else
            python run.py --names-file /tmp/store_names.txt --city "$CITY_IN" 2>&1 | tee /tmp/crawl_output.txt
          fi
          python run.py --stats 2>&1 | tee -a /tmp/crawl_output.txt

      # ── City crawl (all categories in one city) ───────────────────────────────
      - name: Run city crawl
        if: steps.mode.outputs.mode == 'city'
        id: city_crawl
        env:
          CITY_IN: ${{ inputs.city }}
          USE_AGENT: ${{ inputs.use_agent }}
        run: |
          if [ -z "$CITY_IN" ]; then
            echo "::error::city input is required when mode=city"
            exit 1
          fi
          if [ "$USE_AGENT" = "true" ]; then
            python run.py --agent --city-crawl --city "$CITY_IN" 2>&1 | tee /tmp/crawl_output.txt
          else
            python run.py --city-crawl --city "$CITY_IN" 2>&1 | tee /tmp/crawl_output.txt
          fi
          python run.py --stats 2>&1 | tee -a /tmp/crawl_output.txt

      # ── Province rotation — weekly automatic ──────────────────────────────────
      - name: Province rotation — weekly automatic
        if: steps.mode.outputs.mode == 'province-weekly'
        id: province_weekly
        run: |
          python run.py --province-weekly 2>&1 | tee /tmp/crawl_output.txt
          python run.py --generate
          python run.py --stats 2>&1 | tee -a /tmp/crawl_output.txt

      # ── Province crawl — specific province ────────────────────────────────────
      - name: Province crawl — manual
        if: steps.mode.outputs.mode == 'province'
        id: province_crawl
        env:
          PROVINCE_IN: ${{ inputs.province }}
        run: |
          if [ -z "$PROVINCE_IN" ]; then
            echo "::error::province input is required when mode=province"
            exit 1
          fi
          python run.py --province "$PROVINCE_IN" 2>&1 | tee /tmp/crawl_output.txt
          python run.py --generate
          python run.py --stats 2>&1 | tee -a /tmp/crawl_output.txt

      # ── Agent: Toronto test ───────────────────────────────────────────────────
      - name: Run LangGraph agent — Toronto test
        if: steps.mode.outputs.mode == 'agent'
        id: agent_test
        run: |
          python run.py --agent 2>&1 | tee /tmp/crawl_output.txt
          python run.py --generate
          python run.py --stats 2>&1 | tee -a /tmp/crawl_output.txt

      # ── Agent: full crawl ─────────────────────────────────────────────────────
      - name: Run LangGraph agent — full crawl
        if: steps.mode.outputs.mode == 'agent-full'
        id: agent_full
        run: |
          python run.py --agent-full 2>&1 | tee /tmp/crawl_output.txt
          python run.py --generate
          python run.py --stats 2>&1 | tee -a /tmp/crawl_output.txt

      # ── Generate site ─────────────────────────────────────────────────────────
      - name: Generate site only
        if: steps.mode.outputs.mode == 'generate'
        run: |
          python -c "
          from storage import init_db, get_stats
          init_db()
          s = get_stats()
          assert s['total'] > 0, f'No stores in database ({s[\"total\"]}). Run agent or agent-full first.'
          print(f'Database has {s[\"total\"]} stores — generating site.')
          "
          python run.py --generate
          python run.py --stats

      # ── Build email report ────────────────────────────────────────────────────
      - name: Build crawl report
        if: always() && steps.mode.outputs.mode != 'smoke' && steps.mode.outputs.mode != 'generate'
        id: report
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          CITY_IN: ${{ inputs.city }}
          PROVINCE_IN: ${{ inputs.province }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER: ${{ github.event_name }}
          RUN_STARTED_AT: ${{ github.run_started_at }}
        run: |
          python << 'PY'
          import os, re

          mode         = os.environ.get("MODE", "")
          city_in      = os.environ.get("CITY_IN", "")
          province_in  = os.environ.get("PROVINCE_IN", "")
          status       = os.environ.get("JOB_STATUS", "")
          run_url      = os.environ.get("RUN_URL", "")
          trigger      = os.environ.get("TRIGGER", "")
          run_started_at = os.environ.get("RUN_STARTED_AT", "")
          trigger_label = "Scheduled" if trigger == "schedule" else "Manual"

          # Parse stats from crawl output
          output_file = "/tmp/crawl_output.txt"
          output = open(output_file).read() if os.path.exists(output_file) else ""

          def parse_saved(text: str) -> int:
              # Province/agent summary from run.py (authoritative when present)
              summary = re.search(r"\[crawl\] New stores saved:\s*(\d+)", text)
              if summary:
                  return int(summary.group(1))
              # Per-save lines (pipeline + LangGraph agent via tools.py)
              per_save = len(re.findall(r"\[save\] Saved:", text))
              if per_save:
                  return per_save
              # Per-city agent totals (sum across multi-city province crawls)
              city_totals = re.findall(r"New stores this run:\s*(\d+)", text)
              if city_totals:
                  return sum(int(n) for n in city_totals)
              return 0

          def parse_skipped(text: str) -> int:
              return len(
                  re.findall(
                      r"\[save\].*(?:skipped|Already in database)",
                      text,
                      re.IGNORECASE,
                  )
              )

          saved = parse_saved(output)
          skipped = parse_skipped(output)
          totals = re.findall(r"Total (?:stores|in database):\s*(\d+)", output)
          total = totals[-1] if totals else "unknown"

          city_lines = re.findall(r"  (\w[\w\s]+):\s*(\d+) stores", output)
          city_summary = "\n".join(f"  • {city}: {count} stores" for city, count in city_lines)

          # Detect province for province-weekly and province modes
          province_label = ""
          if mode == "province-weekly":
              province_match = re.search(r"🗓️\s+Week \d+ → (.+)", output)
              if province_match:
                  province_label = province_match.group(1).strip()
              else:
                  # Fallback: derive from week number
                  import datetime
                  week = datetime.datetime.now().isocalendar()[1]
                  province_label = f"Week {week} (province unavailable)"
          elif mode == "province":
              province_label = province_in

          province_section = (
              f"PROVINCE\n{'─'*30}\n  {province_label}\n\n"
              if province_label else ""
          )

          status_emoji = "✅" if status == "success" else "❌"
          mode_label = {
              "agent": "Toronto test",
              "agent-full": "Full crawl (all cities)",
              "province-weekly": "Province rotation (weekly)",
              "province": f"Province crawl ({province_in})" if province_in else "Province crawl",
              "city": f"City crawl ({city_in})" if city_in else "City crawl",
              "names": "Named stores",
          }.get(mode, mode)

          subject = f"{status_emoji} African Stores Crawl — {mode_label} ({status.upper()})"

          body = f"""African Stores Canada — Crawl Report
          {'='*50}

          Run type:  {trigger_label} {mode_label}
          Status:    {status_emoji} {status.upper()}
          Time:      {run_started_at}

          RESULTS
          {'─'*30}
          New stores saved:   {saved}
          Duplicates skipped: {skipped}
          Total in database:  {total}

          {province_section}BY CITY
          {'─'*30}
          {city_summary or '  (no city breakdown available)'}

          ACTIONS LOG
          {'─'*30}
          {run_url}

          ---
          African Stores Canada · kere-sifon/african-stores-agent
          Powered by AWS Bedrock + LangGraph + MongoDB Atlas
          """

          # Strip leading whitespace from heredoc
          body = "\n".join(line.lstrip() for line in body.split("\n"))

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"EMAIL_SUBJECT={subject}\n")

          with open("/tmp/email_body.txt", "w") as f:
              f.write(body)

          print(f"Subject: {subject}")
          print(f"Saved: {saved}, Skipped: {skipped}, Total: {total}")
          PY

      # ── Send email ────────────────────────────────────────────────────────────
      - name: Send crawl report email
        if: >
          always() &&
          steps.mode.outputs.mode != 'smoke' &&
          steps.mode.outputs.mode != 'generate'
        run: |
          python << 'PY'
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          from_addr  = os.environ.get("NOTIFY_FROM", "")
          password   = os.environ.get("NOTIFY_PASSWORD", "")
          to_addr    = os.environ.get("NOTIFY_TO", "")
          subject    = os.environ.get("EMAIL_SUBJECT", "African Stores Crawl Report")

          if not all([from_addr, password, to_addr]):
              print("⚠️  Email secrets not configured — skipping notification")
              print("   Add NOTIFY_EMAIL_FROM, NOTIFY_EMAIL_PASSWORD, NOTIFY_EMAIL_TO")
              print("   to GitHub Secrets to enable email reports.")
              exit(0)

          body = open("/tmp/email_body.txt").read()

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = f"African Stores Crawler <{from_addr}>"
          msg["To"]      = to_addr
          msg.attach(MIMEText(body, "plain"))

          try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
                  server.login(from_addr, password)
                  server.sendmail(from_addr, to_addr, msg.as_string())
              print(f"✅ Report sent to {to_addr}")
          except Exception as e:
              print(f"⚠️  Email failed: {e}")
              print("   Check NOTIFY_EMAIL_FROM and NOTIFY_EMAIL_PASSWORD secrets")
              exit(0)  # Don't fail the workflow if email fails
          PY
        env:
          NOTIFY_FROM:     ${{ secrets.NOTIFY_EMAIL_FROM }}
          NOTIFY_PASSWORD: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          NOTIFY_TO:       ${{ secrets.NOTIFY_EMAIL_TO }}

      # ── Upload eval report artifact ───────────────────────────────────────────
      - name: Upload eval report artifact
        if: >
          always() &&
          steps.mode.outputs.mode != 'smoke' &&
          steps.mode.outputs.mode != 'generate' &&
          steps.mode.outputs.mode != 'names'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: eval-report
          path: eval_report.json
          retention-days: 90
          if-no-files-found: ignore

      # ── Upload site artifact ──────────────────────────────────────────────────
      - name: Upload site artifact
        if: always() && steps.mode.outputs.mode != 'smoke'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: directory-site
          path: output/
          retention-days: 30
          if-no-files-found: warn
