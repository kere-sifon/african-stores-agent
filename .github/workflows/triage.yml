name: Security Scan Triage

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  triage:
    name: Scan, triage, and comment
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ci-triage-agent
        uses: kere-sifon/Ci-mvp@v1.1
        with:
          aws-role-to-assume: ${{ secrets.CI_TRIAGE_AWS_ROLE_ARN }}
          s3-bucket: ci-triage-scan-results
          s3-prefix: ""
